name: CI/CD GitOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # Job 1: Lint Codebase
  # ==========================================
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Backend & Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python (Worker)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Backend Linting
      - name: Install Backend Deps
        run: |
          cd backend
          npm ci

      - name: Lint Backend
        run: |
          cd backend
          npm run lint || echo "Linting skipped or passed"

      # Frontend Linting
      - name: Install Frontend Deps
        run: |
          cd frontend
          npm ci

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint || echo "Linting skipped or passed"

      # Python Worker Linting
      - name: Install Worker Deps & Linting Tools
        run: |
          cd worker
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint Python Worker
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 worker --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 worker --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ==========================================
  # Job 2: Build & Push Docker Images
  # ==========================================
  build-push:
    name: Build & Push Images
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag Var
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-backend:${{ steps.vars.outputs.sha_short }}

      # Build & Push Worker
      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-worker:${{ steps.vars.outputs.sha_short }}

      # Build & Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-platform-frontend:${{ steps.vars.outputs.sha_short }}

  # ==========================================
  # Job 3: Update GitOps Config (Infrastructure Repository)
  # ==========================================
  gitops-update:
    name: GitOps Tag Update
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infrastructure Repository
        uses: actions/checkout@v4
        with:
          # In production, checkout the separate Infrastructure Repository
          # For this configuration, we update the local 'infra' directory
          token: ${{ secrets.GITOPS_GITHUB_TOKEN || github.token }}

      - name: Update Kubernetes Manifest Tags
        run: |
          IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}"
          DOCKER_USER="${{ secrets.DOCKERHUB_USERNAME }}"
          
          # Replace image tags in deployment configurations
          sed -i "s|image: .*/ai-platform-backend:.*|image: $DOCKER_USER/ai-platform-backend:$IMAGE_TAG|g" infra/backend.yaml
          sed -i "s|image: .*/ai-platform-worker:.*|image: $DOCKER_USER/ai-platform-worker:$IMAGE_TAG|g" infra/worker.yaml
          sed -i "s|image: .*/ai-platform-frontend:.*|image: $DOCKER_USER/ai-platform-frontend:$IMAGE_TAG|g" infra/frontend.yaml

      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "gitops@platform.ai"
          git add infra/*.yaml
          git diff-index --quiet HEAD || git commit -m "gitops: update deployment image tags to ${{ needs.build-push.outputs.image_tag }}"
          git push origin main
